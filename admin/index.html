<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chatbot Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="./app.js"></script>
</head>
<body class="bg-slate-100 text-slate-900">
  <div class="min-h-screen flex flex-col">
    <header class="bg-slate-900 text-white px-6 py-4 flex items-center justify-between">
      <div>
        <h1 class="text-xl font-semibold">Chatbot Admin</h1>
        <p class="text-sm text-slate-300">Crie mensagens e monte o fluxo visualmente</p>
      </div>
      <div class="flex items-center gap-2">
        <input id="apiBase" class="w-72 rounded-lg px-3 py-2 text-slate-900" value="http://localhost:8000" />
        <button id="btnLoadFlows" class="rounded-lg bg-slate-700 px-4 py-2 hover:bg-slate-600">Carregar</button>
      </div>
    </header>

    <main class="flex-1 grid grid-cols-12 gap-4 p-4">
      <aside class="col-span-3 bg-white rounded-2xl shadow p-4 flex flex-col gap-4">
        <div class="flex items-center justify-between">
          <h2 class="font-semibold">Flows</h2>
          <button id="btnNewFlow" class="rounded-lg bg-emerald-600 text-white px-3 py-2 text-sm hover:bg-emerald-500">Novo</button>
        </div>
        <div id="flowsList" class="space-y-2"></div>
      </aside>

      <section class="col-span-5 bg-white rounded-2xl shadow p-4 flex flex-col gap-4">
        <div class="flex items-center justify-between gap-2">
          <div>
            <h2 class="font-semibold">Editor do fluxo</h2>
            <p id="currentFlowInfo" class="text-sm text-slate-500">Nenhum flow selecionado</p>
          </div>
          <div class="flex gap-2">
            <button id="btnAddNode" class="rounded-lg bg-indigo-600 text-white px-3 py-2 text-sm hover:bg-indigo-500">+ Mensagem</button>
            <button id="btnSaveFlow" class="rounded-lg bg-slate-900 text-white px-3 py-2 text-sm hover:bg-slate-700">Salvar</button>
          </div>
        </div>

        <div class="grid grid-cols-2 gap-3">
          <label class="text-sm">
            <span class="block font-medium mb-1">Nome</span>
            <input id="flowName" class="w-full rounded-lg border px-3 py-2" placeholder="Nome do fluxo" />
          </label>
          <label class="text-sm">
            <span class="block font-medium mb-1">Descrição</span>
            <input id="flowDescription" class="w-full rounded-lg border px-3 py-2" placeholder="Descrição opcional" />
          </label>
        </div>

        <div class="flex-1 overflow-auto border rounded-xl">
          <div id="nodesList" class="p-3 space-y-3"></div>
        </div>
      </section>

      <aside class="col-span-4 bg-white rounded-2xl shadow p-4 flex flex-col gap-4">
        <div class="flex items-center justify-between">
          <h2 class="font-semibold">Preview JSON</h2>
          <button id="btnExportJson" class="rounded-lg bg-sky-600 text-white px-3 py-2 text-sm hover:bg-sky-500">Baixar JSON</button>
        </div>
        <pre id="jsonPreview" class="flex-1 overflow-auto rounded-xl bg-slate-950 text-slate-100 p-4 text-xs leading-5"></pre>
      </aside>
    </main>
  </div>
</body>
</html>
